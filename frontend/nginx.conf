server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # OIDC auth cookies are large — increase request header buffer
    large_client_header_buffers 4 32k;

    # DNS resolver for dynamic upstream (Azure DNS + Google fallback)
    resolver 168.63.129.16 8.8.8.8 valid=30s;

    # API proxy to backend container
    location /api/ {
        proxy_pass ${API_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ${API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # OIDC auth cookies can be large (access+refresh+id tokens stored via SaveTokens)
        # Default 4k/8k is too small → nginx returns 502
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 32k;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        # Never cache index.html so deploys take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
